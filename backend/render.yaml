services:
  # Backend API
  - type: web
    name: agentmarket-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3001
      - key: STELLAR_NETWORK
        value: testnet
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: STELLAR_PUBLIC_KEY
        sync: false
      - key: SOROBAN_CONTRACT_ADDRESS
        value: CC5D5U5BEBUXQFX5XRH7Q263CNWTXKKBY62SAWYF4XRY7RMEGJ6DM6PS
      - key: PINATA_JWT
        sync: false
      - key: COMMISSION_BPS
        value: 2000
